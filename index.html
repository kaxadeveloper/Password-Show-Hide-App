<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Show/Hide</title>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/27d4dbe998.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input-box">
            <input type="password" spellcheck="false" required>
            <label>Password</label>

            <!-- ADD toggle class -->
            <i class="fa-solid fa-eye-slash toggle"></i>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
